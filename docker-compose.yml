services:
  drclaw:
    image: ${REGISTRY:-ghcr.io/9999-12-31}/drclaw:latest
    container_name: drclaw
    restart: always
    ports:
      - "8088:8088"
    environment:
      - TZ=Asia/Shanghai
      - QWENPAW_AUTH_ENABLED=true
      - QWENPAW_AUTH_USERNAME=admin
      - QWENPAW_AUTH_PASSWORD=Xmz@323!
      - QWENPAW_WORKING_DIR=/app/working
      - QWENPAW_SECRET_DIR=/app/working.secret
    volumes:
      - ./data:/app/working
      - ./secrets:/app/working.secret