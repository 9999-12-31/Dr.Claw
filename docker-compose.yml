version: '3.8'

volumes:
  qwenpaw-data:
    name: qwenpaw-data
  qwenpaw-secrets:
    name: qwenpaw-secrets
  qwenpaw-backups:
    name: qwenpaw-backups

services:
  drclaw:
    image: ${REGISTRY:-ghcr.io/9999-12-31}/drclaw:latest
    container_name: drclaw
    restart: always
    ports:
      - "8088:8088"
    environment:
      - TZ=Asia/Shanghai
      - QWENPAW_AUTH_ENABLED=true
      - QWENPAW_AUTH_USERNAME=admin
      - QWENPAW_AUTH_PASSWORD=Xmz@323!
      - QWENPAW_WORKING_DIR=/app/working
      - QWENPAW_SECRET_DIR=/app/working.secret
    volumes:
      - qwenpaw-data:/app/working
      - qwenpaw-secrets:/app/working.secret
      - qwenpaw-backups:/app/working.backups
